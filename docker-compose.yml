services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: LeagueDb
      POSTGRES_USER: leagueuser
      POSTGRES_PASSWORD: leaguepass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=LeagueDb;Username=leagueuser;Password=leaguepass
    depends_on:
      - db

volumes:
  pgdata: